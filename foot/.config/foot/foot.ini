[main]
# Font
font=JetBrainsMono Nerd Font:size=11
font-size-adjustment=0.5
[main]
# ... inne opcje z main ...
selection-target=both  # Zaznaczenie myszką kopiuje do schowka systemowego (możesz wkleić to potem przez Ctrl+V w przeglądarce)

# Environment
term=xterm-256color
dpi-aware=yes
pad=15x15                     

[cursor]
style=block                           
blink=no                          

[mouse]
hide-when-typing=yes              

[colors-dark]
alpha=0.95                            
background=1a1b26                   
foreground=c0caf5                     
selection-foreground=c0caf5
selection-background=33467c         

# --- PALETA KOLORÓW ---
# Te kolory są zoptymalizowane pod Twój nowy .zshrc!
## Normal colors
regular0=15161e  # black
regular1=f7768e  # red
regular2=9ece6a  # green (Ten kolor będzie używany dla Twoich folderów w 'ls')
regular3=e0af68  # yellow (Kolor statusu Git w Zsh)
regular4=7aa2f7  # blue (Baza do pastylek)
regular5=bb9af7  # magenta
regular6=7dcfff  # cyan (Łączniki i znak zachęty)
regular7=a9b1d6  # white

## Bright colors
bright0=414868   # bright black
bright1=f7768e   # bright red
bright2=9ece6a   # bright green
bright3=e0af68   # bright yellow
bright4=7aa2f7   # bright blue
bright5=bb9af7   # bright magenta
bright6=7dcfff   # bright cyan
bright7=c0caf5   # bright white

[bell]
urgent=no
notify=no
visual=no

[url]
# Czym otwierać linki (xdg-open to standard na Linuxie, otwiera domyślną przeglądarkę)
launch=xdg-open ${url}
# Zestaw liter, które będą pojawiać się obok linków (najwygodniejsze pod lewą ręką)
label-letters=sadfjklewcmpgh
# Podkreślanie linków, gdy tryb jest aktywny
osc8-underline=url-mode

[key-bindings]
# --- PODSTAWY ---
clipboard-copy=Control+Shift+c XF86Copy
clipboard-paste=Control+Shift+v XF86Paste
font-increase=Control+plus Control+equal Control+KP_Add
font-decrease=Control+minus Control+KP_Subtract
font-reset=Control+0 Control+KP_0
[key-bindings]
# ... Twoje poprzednie skróty ...
pipe-scrollback=[wl-copy] Control+Shift+p  # Ctrl+Shift+P kopiuje CAŁĄ historię terminala do schowka

# --- ZAAWANSOWANE ---
search-start=Control+Shift+r      # Wyszukiwanie w terminalu
show-urls-launch=Control+Shift+o  # Tryb otwierania linków klawiaturą
spawn-terminal=Control+Shift+n    # Otwiera nowe okno Foota w tym samym folderze!

[scrollback]
lines=10000            # Pamięta 10 tysięcy linii wstecz
multiplier=3.0         # 3x szybsze przewijanie kółkiem myszy

[search-bindings]
# Skróty używane TYLKO podczas wyszukiwania (Ctrl+Shift+R)
cancel=Control+g Control+c Escape
commit=Return
find-prev=Control+r
find-next=Control+s

[csd]
preferred=server                      # Decorations from WM